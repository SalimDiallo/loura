version: "3.9"

services:
  # Base de données PostgreSQL
  db:
    image: postgres:16
    container_name: loura_db_prod
    environment:
      POSTGRES_DB: ${DB_NAME:-loura_db}
      POSTGRES_USER: ${DB_USER:-loura_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - loura_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-loura_user} -d ${DB_NAME:-loura_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  # Redis pour le cache, Celery et Channels
  redis:
    image: redis:7-alpine
    container_name: loura_redis_prod
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_strong_password}
    volumes:
      - redis_data:/data
    networks:
      - loura_network
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD:-redis_strong_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  # Backend Django
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: loura_backend_prod
    environment:
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY}
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=${DB_NAME:-loura_db}
      - DB_USER=${DB_USER:-loura_user}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis_strong_password}
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-redis_strong_password}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-redis_strong_password}@redis:6379/1
      - CHANNEL_LAYERS_HOST=redis://:${REDIS_PASSWORD:-redis_strong_password}@redis:6379/2
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS}
      - DJANGO_SUPERUSER_USERNAME=${DJANGO_SUPERUSER_USERNAME}
      - DJANGO_SUPERUSER_PASSWORD=${DJANGO_SUPERUSER_PASSWORD}
      - DJANGO_SUPERUSER_EMAIL=${DJANGO_SUPERUSER_EMAIL}
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    networks:
      - loura_network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  # Celery Worker
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: loura_celery_worker_prod
    command: celery -A lourabackend worker -l info --concurrency=4
    environment:
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY}
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=${DB_NAME:-loura_db}
      - DB_USER=${DB_USER:-loura_user}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis_strong_password}
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-redis_strong_password}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-redis_strong_password}@redis:6379/1
    networks:
      - loura_network
    depends_on:
      - db
      - redis
      - backend
    restart: always

  # Celery Beat (tâches planifiées)
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: loura_celery_beat_prod
    command: celery -A lourabackend beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY}
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=${DB_NAME:-loura_db}
      - DB_USER=${DB_USER:-loura_user}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis_strong_password}
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-redis_strong_password}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-redis_strong_password}@redis:6379/1
    networks:
      - loura_network
    depends_on:
      - db
      - redis
      - backend
    restart: always

  # Frontend Next.js (Production)
  frontend:
    build:
      context: ./frontend/lourafrontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    container_name: loura_frontend_prod
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    networks:
      - loura_network
    depends_on:
      - backend
    restart: always

  # Nginx Reverse Proxy
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: loura_nginx_prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    networks:
      - loura_network
    depends_on:
      - backend
      - frontend
    restart: always

  # Certbot pour SSL (optionnel mais recommandé)
  certbot:
    image: certbot/certbot:latest
    container_name: loura_certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - loura_network

networks:
  loura_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
