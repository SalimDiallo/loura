version: "3.9"

services:
  # Base de données PostgreSQL
  db:
    image: postgres:16
    container_name: loura_db
    environment:
      POSTGRES_DB: loura_db
      POSTGRES_USER: loura_user
      POSTGRES_PASSWORD: loura_password_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - loura_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loura_user -d loura_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis pour le cache, Celery et Channels
  redis:
    image: redis:7-alpine
    container_name: loura_redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - loura_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Backend Django
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: loura_backend
    environment:
      - DEBUG=True
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=loura_db
      - DB_USER=loura_user
      - DB_PASSWORD=loura_password_dev
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - CHANNEL_LAYERS_HOST=redis://redis:6379/2
      - ALLOWED_HOSTS=localhost,127.0.0.1,backend
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://frontend:3000
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    networks:
      - loura_network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Celery Worker
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: loura_celery_worker
    command: celery -A lourabackend worker -l info
    environment:
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=loura_db
      - DB_USER=loura_user
      - DB_PASSWORD=loura_password_dev
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    networks:
      - loura_network
    depends_on:
      - db
      - redis
      - backend
    restart: unless-stopped

  # Celery Beat (tâches planifiées)
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: loura_celery_beat
    command: celery -A lourabackend beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=loura_db
      - DB_USER=loura_user
      - DB_PASSWORD=loura_password_dev
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    networks:
      - loura_network
    depends_on:
      - db
      - redis
      - backend
    restart: unless-stopped

  # Frontend Next.js (Développement)
  frontend:
    build:
      context: ./frontend/lourafrontend
      dockerfile: Dockerfile.dev
    container_name: loura_frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/core
      - NODE_ENV=development
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/lourafrontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - loura_network
    depends_on:
      - backend
    restart: unless-stopped

networks:
  loura_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
